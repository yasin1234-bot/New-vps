<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>HOSTING VIP | Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #090d16;
            --card-bg: #111827;
            --border: rgba(255, 255, 255, 0.08);
            --border-focus: #6366f1;
            --input-bg: #0b0f19;
            --accent: linear-gradient(135deg, #4f46e5, #9333ea);
            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* প্রিমিয়াম ব্যাকগ্রাউন্ড গ্রিড ইফেক্ট */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.2;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* রিফ্রেশ মারলে ১% ও কাঁপবে না এমন ফিক্সড প্রিমিয়াম কার্ড */
        .login-card {
            width: 92%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 50px rgba(99, 102, 241, 0.05);
            z-index: 10;
            opacity: 0;
            transform: translateY(10px);
            will-change: transform, opacity;
            animation: loadCard 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* লোগো সেকশন */
        .brand-logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { 
            color: var(--text-secondary); 
            font-size: 15px; 
            margin-bottom: 35px; 
            font-weight: 500; 
        }

        .error-box {
            display: none;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: left;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%; 
            padding: 16px 20px 16px 50px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px; 
            color: #fff; 
            font-size: 15px;
            outline: none; 
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .input-wrapper input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .input-wrapper input:focus + i {
            color: #818cf8;
        }

        .btn-submit {
            width: 100%; 
            padding: 16px;
            background: var(--accent);
            border: none; 
            border-radius: 14px;
            color: #fff; 
            font-size: 16px; 
            font-weight: 700;
            cursor: pointer; 
            transition: all 0.25s ease;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:hover { 
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }

        .or-separator {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 25px 0;
            position: relative;
        }
        
        .or-separator::before, .or-separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background-color: var(--border);
        }
        
        .or-separator::before { left: 0; }
        .or-separator::after { right: 0; }

        .btn-alt {
            width: 100%; 
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff; 
            font-size: 15px; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.2s ease;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            text-decoration: none;
        }
        
        .btn-alt:hover {
            background-color: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .footer-link { 
            margin-top: 30px; 
            font-size: 13px; 
        }
        
        .footer-link a { 
            color: var(--text-secondary); 
            text-decoration: none; 
            transition: 0.2s; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
        }
        
        .footer-link a:hover { 
            color: #fff; 
        }

        .swal2-ios-custom {
            background: #111827 !important;
            border-radius: 20px !important;
            border: 1px solid var(--border) !important;
            color: white !important;
        }

        /* কাঁপুনিহীন মসৃণ কার্ড এনিমেশন */
        @keyframes loadCard {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-card { padding: 35px 20px; border-radius: 20px; }
            .brand-logo { font-size: 25px; }
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <div class="login-card">
        <div class="brand-logo">HOSTING VIP</div>
        <p class="subtitle">Sign in to your account</p>

        <div id="errorNotice" class="error-box">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorMsg"></span>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)">
            
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="emailInput" name="username" placeholder="Enter Email" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="passwordInput" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span>Sign In</span>
            </button>
        </form>

        <div class="or-separator">or</div>
        
        <a href="/signup" class="btn-alt">
            <i class="fa-solid fa-user-plus"></i>
            Create new account
        </a>
        </div>
    </div>

    <script>
        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('i');
            const errorBox = document.getElementById('errorNotice');
            const errorMsg = document.getElementById('errorMsg');
            
            errorBox.style.display = 'none';

            btn.disabled = true;
            btnText.innerText = 'Signing In...';
            btnIcon.className = 'fa-solid fa-circle-notch fa-spin';

            try {
                const formData = new FormData(e.target);
                const response = await fetch('/login', { 
                    method: 'POST', 
                    body: formData 
                });

                const data = await response.json();

                if (response.status === 200) {
                    Swal.fire({
                        icon: 'success', title: 'Login Successful', text: 'Redirecting to dashboard...',
                        timer: 2000, showConfirmButton: false, customClass: { popup: 'swal2-ios-custom' }
                    });
                    setTimeout(() => window.location.href = data.url, 1800);
                } 
                else {
                    errorBox.style.display = 'flex';
                    const errTypeFromServer = (data.errorType || '').toLowerCase();

                    if (errTypeFromServer === 'email') {
                        errorMsg.innerText = 'Invalid username or email';
                    } else if (errTypeFromServer === 'password') {
                        errorMsg.innerText = 'Invalid password';
                    } else if (errTypeFromServer === 'both') {
                        errorMsg.innerText = 'Invalid email/username or password';
                    } else {
                        errorMsg.innerText = 'Invalid login credentials';
                    }
                    reset();
                }
            } catch (err) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'System Error', 
                    text: 'Unable to reach the server. Please try again.', 
                    customClass: { popup: 'swal2-ios-custom' } 
                });
                reset();
            }

            function reset() {
                btn.disabled = false;
                btnText.innerText = 'Sign In';
                btnIcon.className = 'fa-solid fa-right-to-bracket';
            }
        }
    </script>
</body>
</html>
